<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>HERO PAGE</title>

<link rel="icon" type="image/gif" href="https://i.pinimg.com/originals/bc/11/80/bc11809c97271e15b7495b7ccd880ab7.gif">
<link href="https://fonts.googleapis.com/css2?family=Poppins:wght@300;400;600;700;900&display=swap" rel="stylesheet">

<style>
/* ================= NAVIGATION (UNCHANGED) ================= */
.navigator-container {
  position: fixed;
  bottom: 25px;
  left: 50%;
  transform: translateX(-50%);
  z-index: 9999;
  background: rgba(0, 0, 0, 0.8);
  backdrop-filter: blur(15px);
  padding: 12px 25px;
  border-radius: 50px;
  border: 1px solid #ff69b4;
  display: flex;
  align-items: center;
  gap: 15px;
  box-shadow: 0 10px 40px rgba(0,0,0,0.8);
}

.nav-btn {
  color: #ff69b4;
  text-decoration: none;
  width: 40px;
  height: 40px;
  display: flex;
  align-items: center;
  justify-content: center;
  border-radius: 50%;
  font-weight: bold;
  transition: 0.3s;
}

.nav-btn.active {
  background: #ff1493;
  color: white;
  box-shadow: 0 0 15px #ff1493;
}

.nav-btn:hover:not(.active) {
  background: rgba(255, 255, 255, 0.1);
}

.arrow {
  cursor: pointer;
  font-size: 24px;
  color: #ff1493;
  background: none;
  border: none;
}

/* ================= BASE ================= */
* {
  margin: 0;
  padding: 0;
  box-sizing: border-box;
}

:root {
  --pink: #ff69b4;
  --hotpink: #ff1493;
}

/* ================= HERO ================= */
body {
  font-family: 'Poppins', sans-serif;
  overflow: hidden;
}

.hero {
  height: 100vh;
  display: flex;
  justify-content: center;
  align-items: center;
  text-align: center;
  color: white;
  background: url('https://i.pinimg.com/1200x/40/12/f4/4012f4e9bf48d6e96f7c0fce3774adbe.jpg') center/cover no-repeat;
  position: relative;
}

/* DARK OVERLAY */
.hero::before {
  content: "";
  position: absolute;
  inset: 0;
  background: linear-gradient(
    135deg,
    rgba(10,10,20,0.7),
    rgba(20,10,30,0.6),
    rgba(255,20,147,0.25)
  );
  backdrop-filter: blur(2px);
}

/* GLOW ORBS */
.hero::after {
  content: "";
  position: absolute;
  width: 300px;
  height: 300px;
  background: rgba(255,20,147,0.4);
  filter: blur(120px);
  top: -80px;
  left: -80px;
  border-radius: 50%;
  animation: float 6s ease-in-out infinite;
}

/* ================= CARD ================= */
.card {
  position: relative;
  z-index: 2;
  max-width: 750px;
  padding: 60px 50px;
  border-radius: 30px;
  background: rgba(255,255,255,0.12);
  backdrop-filter: blur(25px);
  border: 1px solid rgba(255,105,180,0.4);
  box-shadow: 0 25px 70px rgba(0,0,0,0.5);
  animation: fadeIn 1.2s ease;
  transition: 0.4s;
}

.card:hover {
  transform: translateY(-10px);
  border-color: var(--hotpink);
}

/* ================= TITLE (UPDATED: CLEAN WHITE) ================= */
h1 {
  font-size: 4rem;
  font-weight: 900;
  color: #ffffff;
  margin-bottom: 20px;
  letter-spacing: -2px;
  text-shadow: 0 3px 10px rgba(0,0,0,0.6);
}

/* ================= TEXT ================= */
p {
  font-size: 1.2rem;
  font-weight: 300;
  opacity: 0.95;
  line-height: 1.6;
  margin-bottom: 35px;
}

/* ================= BUTTONS ================= */
.btns {
  display: flex;
  gap: 20px;
  justify-content: center;
  flex-wrap: wrap;
}

.btn {
  padding: 16px 40px;
  border-radius: 50px;
  text-decoration: none;
  font-weight: 700;
  text-transform: uppercase;
  letter-spacing: 1px;
  transition: 0.4s;
}

.primary {
  background: linear-gradient(145deg, var(--pink), var(--hotpink));
  color: white;
  box-shadow: 0 20px 50px rgba(255,20,147,0.5);
}

.primary:hover {
  transform: translateY(-8px) scale(1.05);
}

.secondary {
  background: rgba(255,255,255,0.1);
  border: 2px solid var(--hotpink);
  color: white;
  backdrop-filter: blur(10px);
}

.secondary:hover {
  background: var(--hotpink);
  transform: translateY(-8px) scale(1.05);
}

/* ================= ANIMATIONS ================= */
@keyframes fadeIn {
  from { opacity: 0; transform: translateY(30px); }
  to { opacity: 1; transform: translateY(0); }
}

@keyframes float {
  0%,100% { transform: translateY(0); }
  50% { transform: translateY(-20px); }
}

/* ================= RESPONSIVE ================= */
@media (max-width: 600px) {
  h1 { font-size: 2.5rem; }
  .card { padding: 40px 25px; }
  p { font-size: 1rem; }
  .btns { flex-direction: column; }
}
</style>
</head>

<body>

<!-- NAVIGATION -->
<div class="navigator-container">
  <button class="arrow" onclick="navPrev()">‹</button>

  <a href="activity6.html" class="nav-btn" id="link1">1</a>
  <a href="activity5.html" class="nav-btn" id="link2">2</a>
  <a href="activity4.html" class="nav-btn" id="link3">3</a>
  <a href="activity2.html" class="nav-btn" id="link4">4</a>
  <a href="activity3.html" class="nav-btn" id="link5">5</a>
  <a href="index.html" class="nav-btn">🏠</a>

  <button class="arrow" onclick="navNext()">›</button>
</div>

<!-- HERO -->
<section class="hero">
  <div class="card">
    <h1>Creative Web Design</h1>
    <p>
      by: Pinote, Juliana A.<br><br>
      A curated compilation of design exercises showcasing UI styling, animations, and front-end fundamentals.
    </p>

    <div class="btns">
      <a href="activity4.html" class="btn primary">Explore Portfolio</a>
      <a href="activity2.html" class="btn secondary">Get Started</a>
    </div>
  </div>
</section>

<script>
const navSequence = [
  "activity6.html",
  "activity5.html",
  "activity4.html",
  "activity2.html",
  "activity3.html"
];

const currentFile = window.location.pathname.split("/").pop() || "index.html";
const currentIndex = navSequence.indexOf(currentFile);

if (currentIndex !== -1) {
  document.getElementById(`link${currentIndex + 1}`).classList.add('active');
}

function navNext() {
  if (currentIndex < navSequence.length - 1) {
    window.location.href = navSequence[currentIndex + 1];
  }
}

function navPrev() {
  if (currentIndex > 0) {
    window.location.href = navSequence[currentIndex - 1];
  }
}
</script>

</body>
</html>
