<!DOCTYPE html>
<html>
<head>
  <title>CSS BASIC</title>
  <style>
    /* Navigator Styling */
.navigator-container {
  position: fixed;
  bottom: 25px;
  left: 50%;
  transform: translateX(-50%);
  z-index: 9999;
  background: rgba(0, 0, 0, 0.8);
  backdrop-filter: blur(15px);
  padding: 12px 25px;
  border-radius: 50px;
  border: 1px solid #ff69b4;
  display: flex;
  align-items: center;
  gap: 15px;
  box-shadow: 0 10px 40px rgba(0,0,0,0.8);
}
.nav-btn {
  color: #ff69b4;
  text-decoration: none;
  width: 40px;
  height: 40px;
  display: flex;
  align-items: center;
  justify-content: center;
  border-radius: 50%;
  font-weight: bold;
  transition: 0.3s;
}
.nav-btn.active {
  background: #ff1493;
  color: white;
  box-shadow: 0 0 15px #ff1493;
}
.nav-btn:hover:not(.active) {
  background: rgba(255, 255, 255, 0.1);
}
.arrow { cursor: pointer; font-size: 24px; color: #ff1493; background: none; border: none; }
    body {
      background-image: url('https://i.pinimg.com/736x/a4/8a/f4/a48af4a40d8163ac7713ea359661677c.jpg');
      background-size: cover;
      background-position: center;
      background-attachment: fixed;
      font-family: 'Georgia', serif;
      padding: 40px;
      min-height: 100vh;
      position: relative;
      overflow-x: hidden;
    }
    
    body::before {
      content: '';
      position: fixed;
      top: 0;
      left: 0;
      width: 100%;
      height: 100%;
      background: rgba(255,20,147,0.15);
      backdrop-filter: blur(1px);
      z-index: 1;
    }
    
    body > * {
      position: relative;
      z-index: 2;
    }

    marquee {
      color: #ffffff;
      font-family: 'Times New Roman', serif;
      font-size: 20px;
      font-weight: bold;
      text-shadow: 3px 3px 8px rgba(0,0,0,0.9);
      background: rgba(0,0,0,0.8);
      padding: 12px 20px;
      border-radius: 25px;
      backdrop-filter: blur(15px);
      border: 2px solid rgba(255,105,180,0.5);
      box-shadow: 0 8px 25px rgba(255,105,180,0.4);
    }
  </style>
  <div class="navigator-container">
  <button class="arrow" onclick="navPrev()">‹</button>
  
  <a href="activity6.html" class="nav-btn" id="link1">1</a>
  <a href="activity5.html" class="nav-btn" id="link2">2</a>
  <a href="activity4.html" class="nav-btn" id="link3">3</a>
  <a href="activity2.html" class="nav-btn" id="link4">4</a>
  <a href="activity3.html" class="nav-btn" id="link5">5</a>
  <a href="index.html" class="nav-btn">🏠</a>

  <button class="arrow" onclick="navNext()">›</button>
</div>

<script>
  // Sequence Definition (Activity 7 is now just this logic)
  const navSequence = [
    "activity6.html", 
    "activity5.html", 
    "activity4.html", 
    "activity2.html", 
    "activity3.html"
  ];

  // Identify current page
  const currentFile = window.location.pathname.split("/").pop() || "index.html";
  const currentIndex = navSequence.indexOf(currentFile);

  // Set Active Class
  if (currentIndex !== -1) {
    document.getElementById(`link${currentIndex + 1}`).classList.add('active');
  }

  function navNext() {
    if (currentIndex < navSequence.length - 1) {
      window.location.href = navSequence[currentIndex + 1];
    }
  }

  function navPrev() {
    if (currentIndex > 0) {
      window.location.href = navSequence[currentIndex - 1];
    }
  }
</script>
</head>
<body>

<marquee>
ACTIVITY 2: CSS BASIC 
</marquee>

<br><br>

<button class="zerotwo-pink-btn">Darling!</button>
<style>
  .zerotwo-pink-btn {
    background: linear-gradient(145deg, #ff1493, #ff69b4, #ff1493);
    color: #ffffff;
    padding: 15px 35px;
    border: none;
    border-radius: 25px;
    font-weight: bold;
    text-shadow: 2px 2px 4px rgba(0,0,0,0.9);
    box-shadow: 0 10px 30px rgba(255,105,180,0.7), inset 0 1px 4px rgba(255,255,255,0.3);
    transition: all 0.3s ease;
    backdrop-filter: blur(12px);
    border: 1px solid rgba(255,255,255,0.2);
    position: relative;
    overflow: hidden;
  }
  .zerotwo-pink-btn::before {
    content: '💕';
    position: absolute;
    right: 15px;
    top: 50%;
    transform: translateY(-50%);
    font-size: 18px;
    opacity: 0;
    transition: all 0.3s ease;
  }
  .zerotwo-pink-btn:hover {
    transform: translateY(-4px);
    box-shadow: 0 15px 40px rgba(255,105,180,0.9), inset 0 1px 4px rgba(255,255,255,0.4);
  }
  .zerotwo-pink-btn:hover::before {
    opacity: 1;
    animation: heartbeat 1.5s infinite;
  }
  @keyframes heartbeat {
    0%, 100% { transform: translateY(-50%) scale(1); }
    50% { transform: translateY(-50%) scale(1.2); }
  }
</style>

<button class="darling-red-btn">Shine Effect</button>
<style>
  .darling-red-btn {
    background: linear-gradient(145deg, #ff4500, #ff6347, #ff1493);
      color: white;
    padding: 15px 40px;
    border: none;
    border-radius: 30px;
    font-weight: 500;
    text-shadow: 2px 2px 4px rgba(0,0,0,0.9);
    box-shadow: 0 8px 25px rgba(255,69,180,0.8), inset 0 1px 4px rgba(255,255,255,0.3);
    position: relative;
    overflow: hidden;
    backdrop-filter: blur(12px);
    border: 1px solid rgba(255,255,255,0.2);
  }
  .darling-red-btn::before {
    content: '';
    position: absolute;
    top: 0;
    left: -100%;
    width: 100%;
    height: 100%;
    background: linear-gradient(90deg, transparent, rgba(255,255,255,0.4), transparent);
    transition: left 0.5s;
  }
  .darling-red-btn:hover::before {
    left: 100%;
  }
  .darling-red-btn:hover {
    transform: translateY(-3px);
  }
</style>

<button class="klaxosaur-green-btn">Sign up</button>
<style>
  .klaxosaur-green-btn {
    background: linear-gradient(45deg, #00ff7f, #32cd32, #00fa9a);
    color: #000000;
    padding: 15px 30px;
    border: none;

    font-weight: bold;

<style>

    padding: 15px 25px;
    border: 2px solid #ff69b4;

    transform: translateY(-3px);
  }

<button class="strelizia-blue-btn">Apply now!</button>
<button class="strelizia-blue-outline">Save</button>
<style>
  .strelizia-blue-btn {
    background: linear-gradient(145deg, #1e90ff, #4169e1, #00bfff);
    color: #ffffff;
    padding: 15px 30px;
    border: none;
    border-radius: 40px;
    font-weight: 600;
    position: relative;
    backdrop-filter: blur(15px);
    border: 1px solid rgba(255,255,255,0.4);
  }
  .strelizia-blue-btn::after {
    content: '🌸';
    position: absolute;
    right: 15px;
    top: 50%;
    transform: translateY(-50%);

    border: 2px solid #1e90ff;

</style>
