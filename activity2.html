<!DOCTYPE html>
<html>
<head>
  <title>Activity2.html</title>
  <style>
    body {
      background-image: url('https://i.pinimg.com/736x/a4/8a/f4/a48af4a40d8163ac7713ea359661677c.jpg');
      background-size: cover;
      background-position: center;
      background-attachment: fixed;
      font-family: 'Georgia', serif;
      padding: 40px;
      min-height: 100vh;
      position: relative;
      overflow-x: hidden;
    }
    
    body::before {
      content: '';
      position: fixed;
      top: 0;
      left: 0;
      width: 100%;
      height: 100%;
      background: rgba(255,20,147,0.15);
      backdrop-filter: blur(1px);
      z-index: 1;
    }
    
    body > * {
      position: relative;
      z-index: 2;
    }

    marquee {
      color: #ff69b4;
      font-family: 'Times New Roman', serif;
      font-size: 20px;
      font-weight: bold;
      text-shadow: 3px 3px 8px rgba(0,0,0,0.9);
      background: rgba(0,0,0,0.8);
      padding: 12px 20px;
      border-radius: 25px;
      backdrop-filter: blur(15px);
      border: 2px solid rgba(255,105,180,0.5);
      box-shadow: 0 8px 25px rgba(255,105,180,0.4);
    }
  </style>
</head>
<body>

<marquee>
Activity 2 : PINOTE, JULIANA A. BSGD 3-A 
</marquee>

<br><br>

<!-- Zero Two Pink Button -->
<button class="zerotwo-pink-btn">Darling!</button>
<style>
  .zerotwo-pink-btn {
    background: linear-gradient(145deg, #ff1493, #ff69b4, #ff1493);
    color: #ffffff;
    padding: 15px 35px;
    border: none;
    border-radius: 25px;
    font-weight: bold;
    text-shadow: 2px 2px 4px rgba(0,0,0,0.9);
    box-shadow: 0 10px 30px rgba(255,105,180,0.7), inset 0 1px 4px rgba(255,255,255,0.3);
    transition: all 0.3s ease;
    backdrop-filter: blur(12px);
    border: 1px solid rgba(255,255,255,0.2);
    position: relative;
    overflow: hidden;
  }
  .zerotwo-pink-btn::before {
    content: '💕';
    position: absolute;
    right: 15px;
    top: 50%;
    transform: translateY(-50%);
    font-size: 18px;
    opacity: 0;
    transition: all 0.3s ease;
  }
  .zerotwo-pink-btn:hover {
    transform: translateY(-4px);
    box-shadow: 0 15px 40px rgba(255,105,180,0.9), inset 0 1px 4px rgba(255,255,255,0.4);
  }
  .zerotwo-pink-btn:hover::before {
    opacity: 1;
    animation: heartbeat 1.5s infinite;
  }
  @keyframes heartbeat {
    0%, 100% { transform: translateY(-50%) scale(1); }
    50% { transform: translateY(-50%) scale(1.2); }
  }
</style>

<!-- Darling Red Button -->
<button class="darling-red-btn">Shine Effect</button>
<style>
  .darling-red-btn {
    background: linear-gradient(145deg, #ff4500, #ff6347, #ff1493);
      color: white;
    padding: 15px 40px;
    border: none;
    border-radius: 30px;
    font-weight: 500;
    text-shadow: 2px 2px 4px rgba(0,0,0,0.9);
    box-shadow: 0 8px 25px rgba(255,69,180,0.8), inset 0 1px 4px rgba(255,255,255,0.3);
    position: relative;
    overflow: hidden;
    backdrop-filter: blur(12px);
    border: 1px solid rgba(255,255,255,0.2);
  }
  .darling-red-btn::before {
    content: '';
    position: absolute;
    top: 0;
    left: -100%;
    width: 100%;
    height: 100%;
    background: linear-gradient(90deg, transparent, rgba(255,255,255,0.4), transparent);
    transition: left 0.5s;
  }
  .darling-red-btn:hover::before {
    left: 100%;
  }
  .darling-red-btn:hover {
    transform: translateY(-3px);
  }
</style>

<!-- Klaxosaur Green Button -->
<button class="klaxosaur-green-btn">Sign up</button>
<style>
  .klaxosaur-green-btn {
    background: linear-gradient(45deg, #00ff7f, #32cd32, #00fa9a);
    color: #000000;
    padding: 15px 30px;
    border: none;
    border-radius: 50px;
    font-weight: bold;
    box-shadow: 0 10px 30px rgba(0,255,127,0.8), inset 0 1px 4px rgba(255,255,255,0.2);
    transition: all 0.4s ease;
    backdrop-filter: blur(12px);
    border: 1px solid rgba(255,255,255,0.2);
  }
  .klaxosaur-green-btn:hover {
    transform: scale(1.05);
    box-shadow: 0 15px 40px rgba(0,255,127,0.9), inset 0 1px 4px rgba(255,255,255,0.3);
  }
</style>

<!-- APE Purple Button -->
<button class="ape-purple-btn">Get started</button>
<button class="ape-purple-outline">Download</button>
<style>
  .ape-purple-btn {
    background: linear-gradient(145deg, #9932cc, #da70d6, #ba55d3);
    color: #ffffff;
    padding: 15px 25px;
    border: 2px solid #ff69b4;
    border-radius: 8px;
    font-weight: bold;
    text-shadow: 2px 2px 4px rgba(0,0,0,1);
    box-shadow: inset 0 2px 6px rgba(255,105,180,0.3), 0 8px 25px rgba(255,105,180,0.9);
    margin-right: 15px;
    backdrop-filter: blur(12px);
  }
  .ape-purple-btn:hover {
    background: linear-gradient(145deg, #da70d6, #9932cc);
    box-shadow: inset 0 2px 6px rgba(255,105,180,0.4), 0 12px 35px rgba(255,105,180,1);
    transform: translateY(-2px);
  }
  .ape-purple-outline {
    background: rgba(255,255,255,0.95);
    color: #9932cc;
    padding: 15px 25px;
    border: 2px solid #9932cc;
    border-radius: 8px;
    font-weight: 500;
    backdrop-filter: blur(20px);
    box-shadow: 0 6px 20px rgba(255,105,180,0.5);
  }
  .ape-purple-outline:hover {
    background: rgba(255,105,180,0.2);
    transform: translateY(-3px);
    box-shadow: 0 10px 30px rgba(255,105,180,0.7);
  }
</style>

<!-- Strelizia Blue Button -->
<button class="strelizia-blue-btn">Apply on company website</button>
<button class="strelizia-blue-outline">Save</button>
<style>
  .strelizia-blue-btn {
    background: linear-gradient(145deg, #1e90ff, #4169e1, #00bfff);
    color: #ffffff;
    padding: 15px 30px;
    border: none;
    border-radius: 40px;
    font-weight: 600;
    box-shadow: 0 10px 35px rgba(30,144,255,0.8), inset 0 1px 4px rgba(0,0,0,0.1);
    position: relative;
    backdrop-filter: blur(15px);
    border: 1px solid rgba(255,255,255,0.4);
  }
  .strelizia-blue-btn::after {
    content: '🌸';
    position: absolute;
    right: 15px;
    top: 50%;
    transform: translateY(-50%);
    font-size: 20px;
    animation: sparkle 2s infinite;
  }
  @keyframes sparkle {
    0%, 100% { opacity: 0.5; transform: translateY(-50%) scale(1) rotate(0deg); }
    50% { opacity: 1; transform: translateY(-50%) scale(1.3) rotate(180deg); }
  }
  .strelizia-blue-outline {
    background: rgba(255,255,255,0.95);
    color: #1e90ff;
    padding: 15px 30px;
    border: 2px solid #1e90ff;
    border-radius: 40px;
    font-weight: 500;
    backdrop-filter: blur(25px);
    box-shadow: 0 8px 30px rgba(30,144,255,0.6);
  }
  .strelizia-blue-outline:hover {
    background: rgba(30,144,255,0.2);
    transform: translateY(-4px);
    box-shadow: 0 12px 40px rgba(30,144,255,0.8);
  }
</style>

</body>
</html>
