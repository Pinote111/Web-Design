<!DOCTYPE html>
<html>
<head>
<title>CSS BASIC</title>

<link href="https://fonts.googleapis.com/css2?family=Poppins:wght@300;400;600;700&display=swap" rel="stylesheet">

<style>

/* ================= NAVIGATION ================= */
.navigator-container {
  position: fixed;
  bottom: 25px;
  left: 50%;
  transform: translateX(-50%);
  z-index: 9999;

  background: rgba(0,0,0,0.75);
  backdrop-filter: blur(15px);
  padding: 12px 20px;
  border-radius: 50px;
  border: 1px solid #ff69b4;

  display: flex;
  align-items: center;
  gap: 12px;
  box-shadow: 0 10px 40px rgba(0,0,0,0.7);
}

.nav-btn {
  color: #ff69b4;
  text-decoration: none;
  width: 38px;
  height: 38px;
  display: flex;
  align-items: center;
  justify-content: center;
  border-radius: 50%;
  font-weight: bold;
  transition: 0.3s;
}

.nav-btn.active {
  background: #ff1493;
  color: white;
  box-shadow: 0 0 15px #ff1493;
}

.nav-btn:hover:not(.active) {
  background: rgba(255,255,255,0.1);
}

.arrow {
  font-size: 22px;
  color: #ff1493;
  background: none;
  border: none;
  cursor: pointer;
}

/* ================= GLOBAL ================= */
* {
  margin: 0;
  padding: 0;
  box-sizing: border-box;
  font-family: 'Poppins', sans-serif;
}

body {
  min-height: 100vh;
  display: flex;
  flex-direction: column;
  align-items: center;
  justify-content: center;
  gap: 25px;

  background: url('https://i.pinimg.com/736x/a4/8a/f4/a48af4a40d8163ac7713ea359661677c.jpg') center/cover fixed;
  position: relative;
}

/* DARK OVERLAY */
body::before {
  content: "";
  position: fixed;
  inset: 0;
  background: rgba(0,0,0,0.6);
  backdrop-filter: blur(2px);
  z-index: 0;
}

body > * {
  position: relative;
  z-index: 1;
}

/* ================= TEXT ================= */
h1 {
  color: white;
  font-size: 34px;
  text-shadow: 0 5px 25px rgba(0,0,0,0.8);
}

marquee {
  color: #ff69b4;
  font-weight: 600;
  background: rgba(0,0,0,0.6);
  padding: 10px 20px;
  border-radius: 20px;
  border: 1px solid #ff69b4;
}

/* ================= BUTTON LAYOUT ================= */
.container {
  display: flex;
  flex-wrap: wrap;
  justify-content: center;
  gap: 15px;
  max-width: 900px;
}

/* ================= BASE BUTTON ================= */
button {
  padding: 12px 22px;
  font-weight: 600;
  cursor: pointer;
  border: none;
  font-size: 14px;
  transition: 0.3s ease;
}

/* ================= BUTTON STYLES ================= */

.uber-btn {
  background: black;
  color: white;
}
.uber-btn:hover { transform: translateY(-3px); background: #222; }

.amazon-btn {
  background: rgb(255,216,20);
  color: black;
  border-radius: 20px;
}
.amazon-btn:hover { transform: translateY(-3px); }

.github-btn {
  background: rgb(46,164,79);
  color: white;
  border-radius: 6px;
}
.github-btn:hover { transform: translateY(-3px); }

.bootstrap-btn {
  background: rgb(121,82,179);
  color: white;
  border-radius: 4px;
}
.bootstrap-btn:hover { transform: translateY(-3px); }

.bootstrap-outline {
  background: transparent;
  border: 2px solid #aaa;
  color: #ddd;
  border-radius: 4px;
}
.bootstrap-outline:hover {
  background: rgba(255,255,255,0.1);
}

.linkedin-btn {
  background: rgb(10,102,194);
  color: white;
  border-radius: 25px;
}
.linkedin-btn:hover { transform: translateY(-3px); }

.linkedin-outline {
  background: white;
  color: rgb(10,102,194);
  border: 2px solid rgb(10,102,194);
  border-radius: 25px;
}
.linkedin-outline:hover {
  background: rgba(10,102,194,0.1);
}

</style>
</head>

<body>

<!-- NAVIGATION (KEPT EXACT SYSTEM) -->
<div class="navigator-container">
  <button class="arrow" onclick="navPrev()">‹</button>

  <a href="activity6.html" class="nav-btn" id="link1">1</a>
  <a href="activity5.html" class="nav-btn" id="link2">2</a>
  <a href="activity4.html" class="nav-btn" id="link3">3</a>
  <a href="activity2.html" class="nav-btn" id="link4">4</a>
  <a href="activity3.html" class="nav-btn" id="link5">5</a>
  <a href="index.html" class="nav-btn">🏠</a>

  <button class="arrow" onclick="navNext()">›</button>
</div>

<script>
const navSequence = [
  "activity6.html",
  "activity5.html",
  "activity4.html",
  "activity2.html",
  "activity3.html"
];

const currentFile = window.location.pathname.split("/").pop() || "index.html";
const currentIndex = navSequence.indexOf(currentFile);

if (currentIndex !== -1) {
  document.getElementById(`link${currentIndex + 1}`).classList.add("active");
}

function navNext() {
  if (currentIndex < navSequence.length - 1) {
    window.location.href = navSequence[currentIndex + 1];
  }
}

function navPrev() {
  if (currentIndex > 0) {
    window.location.href = navSequence[currentIndex - 1];
  }
}
</script>

<!-- TITLE -->
<marquee>ACTIVITY #2: CSS BASIC </marquee>

<h1>Button Styles</h1>

<!-- BUTTONS -->
<div class="container">

  <button class="uber-btn">Request now</button>
  <button class="amazon-btn">Add to Cart</button>
  <button class="github-btn">Sign up</button>
  <button class="bootstrap-btn">Get started</button>
  <button class="bootstrap-outline">Download</button>
  <button class="linkedin-btn">Apply now</button>
  <button class="linkedin-outline">Save</button>

</div>

</body>
</html>
