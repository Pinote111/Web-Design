<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <title>DESIGN PORTFOLIO</title>
  <link rel="icon" type="image/gif" href="https://i.pinimg.com/originals/bc/11/80/bc11809c97271e15b7495b7ccd880ab7.gif">
  <style>
    * { margin: 0; padding: 0; box-sizing: border-box; font-family: 'Poppins', sans-serif; }
    body {
      height: 100vh;
      background: #000;
      display: flex;
      justify-content: center;
      align-items: center;
      text-align: center;
      color: #fff;
      overflow: hidden;
    }
    .bg {
      position: absolute;
      inset: 0;
      background: url('https://i.pinimg.com/originals/a9/89/ce/a989ced391db5317f5c1dba895f4f92f.gif') center/cover;
      opacity: 0.2;
      z-index: -1;
    }
    h1 { font-size: 5rem; letter-spacing: 10px; text-shadow: 0 0 20px #ff1493; }
    .start-btn {
      margin-top: 30px;
      padding: 15px 40px;
      border: 2px solid #ff1493;
      background: rgba(255, 20, 147, 0.1);
      color: #fff;
      text-decoration: none;
      border-radius: 50px;
      font-weight: bold;
      transition: 0.3s;
      display: inline-block;
    }
    .start-btn:hover { background: #ff1493; box-shadow: 0 0 30px #ff1493; }
  </style>
</head>
<body>
  <div class="bg"></div>
  <div class="content">
    <p style="color: #ff69b4; letter-spacing: 3px;">WEB DESIGN FINALS</p>
    <h1>JOURNEY</h1>
    <a href="activity6.html" class="start-btn">ENTER PORTFOLIO</a>
  </div>
</body>
</html>
