<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <title>DESIGN PORTFOLIO</title>

  <link rel="icon" type="image/gif" href="https://i.pinimg.com/originals/bc/11/80/bc11809c97271e15b7495b7ccd880ab7.gif">

  <style>
    :root {
      --pink: #ff1493;
      --hotpink: #ff69b4;
      --darkpink: #8b0a50;
    }

    * {
      margin: 0;
      padding: 0;
      box-sizing: border-box;
      font-family: 'Poppins', sans-serif;
    }

    body {
      height: 100vh;
      background: #050505;
      display: flex;
      justify-content: center;
      align-items: center;
      text-align: center;
      color: #fff;
      overflow: hidden;
    }

    .bg {
      position: absolute;
      inset: 0;
      background: url('https://i.pinimg.com/originals/a9/89/ce/a989ced391db5317f5c1dba895f4f92f.gif') center/cover;
      opacity: 0.15;
      z-index: -1;
      filter: grayscale(30%);
    }

    h1 { 
      font-size: 5rem; 
      letter-spacing: 15px; 
      text-shadow: 0 0 20px var(--darkpink); 
      margin: 10px 0;
      font-weight: 900;
    }

    .start-btn {
      margin-top: 30px;
      padding: 15px 45px;
      border: 2px solid var(--darkpink);
      background: rgba(139, 10, 80, 0.1);
      color: #fff;
      border-radius: 50px;
      font-weight: bold;
      letter-spacing: 2px;
      transition: 0.4s;
      text-decoration: none;
      display: inline-block;
    }

    .start-btn:hover { 
      background: var(--darkpink); 
      box-shadow: 0 0 40px var(--darkpink);
      transform: translateY(-3px);
    }

  </style>
</head>

<body>

  <div class="bg"></div>

  <div>
    <p style="color: var(--hotpink); letter-spacing: 5px; font-weight: 300;">
      WEB DESIGN FINALS <br> by: Juliana P.
    </p>

    <h1>PORTFOLIO</h1>

    <!-- ✅ GO TO LOGIN PAGE -->
    <a href="activity6.html" class="start-btn">LOGIN</a>
  </div>

</body>
</html>
