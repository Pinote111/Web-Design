<!DOCTYPE html>
<html>
<head>
  <title>CSS HOVER, SHADOW AND TRANSITION</title>

  <style>
    /* Navigator Styling (UNCHANGED) */
    .navigator-container {
      position: fixed;
      bottom: 25px;
      left: 50%;
      transform: translateX(-50%);
      z-index: 9999;
      background: rgba(0, 0, 0, 0.8);
      backdrop-filter: blur(15px);
      padding: 12px 25px;
      border-radius: 50px;
      border: 1px solid #ff69b4;
      display: flex;
      align-items: center;
      gap: 15px;
      box-shadow: 0 10px 40px rgba(0,0,0,0.8);
    }

    .nav-btn {
      color: #ff69b4;
      text-decoration: none;
      width: 40px;
      height: 40px;
      display: flex;
      align-items: center;
      justify-content: center;
      border-radius: 50%;
      font-weight: bold;
      transition: 0.3s;
    }

    .nav-btn.active {
      background: #ff1493;
      color: white;
      box-shadow: 0 0 15px #ff1493;
    }

    .nav-btn:hover:not(.active) {
      background: rgba(255, 255, 255, 0.1);
    }

    .arrow {
      cursor: pointer;
      font-size: 24px;
      color: #ff1493;
      background: none;
      border: none;
    }

    /* BACKGROUND */
    body {
      background-image: url('https://i.pinimg.com/1200x/f4/73/d2/f473d2d7701e62471ca98fa365406f8b.jpg');
      background-size: cover;
      background-position: center;
      background-attachment: fixed;
      font-family: 'Georgia', serif;
      padding: 40px;
      min-height: 100vh;
      position: relative;
      overflow-x: hidden;
    }

    body::before {
      content: '';
      position: fixed;
      top: 0;
      left: 0;
      width: 100%;
      height: 100%;
      background: rgba(255,20,147,0.18);
      backdrop-filter: blur(1.5px);
      z-index: 1;
    }

    body > * {
      position: relative;
      z-index: 2;
    }

    /* HEADER (Activity 2 style) */
    h1 {
      color: #ffffff;
      font-family: 'Times New Roman', serif;
      font-size: 22px;
      font-weight: bold;
      text-shadow: 3px 3px 8px rgba(0,0,0,0.9);
      background: rgba(255,255,255,0.12);
      padding: 18px 25px;
      border-radius: 25px;
      backdrop-filter: blur(20px);
      border: 2px solid rgba(255,105,180,0.6);
      box-shadow: 0 10px 35px rgba(255,105,180,0.5);
      text-align: center;
      margin-bottom: 40px;
    }

    /* GRID */
    .effects-container {
      max-width: 1000px;
      margin: 0 auto;
      display: grid;
      grid-template-columns: repeat(auto-fit, minmax(320px, 1fr));
      gap: 30px;
    }

    /* CARD */
    .effect-card {
      background: rgba(255,255,255,0.12);
      backdrop-filter: blur(25px);
      border-radius: 20px;
      padding: 25px;
      border: 1px solid rgba(255,105,180,0.4);
      box-shadow: 0 20px 50px rgba(0,0,0,0.5);
      transition: 0.4s ease;
    }

    .effect-card:hover {
      transform: translateY(-10px);
      box-shadow: 0 30px 70px rgba(255,105,180,0.6);
    }

    /* TITLE */
    .effect-title {
      text-align: center;
      font-size: 20px;
      font-weight: bold;
      color: white;
      margin-bottom: 10px;
      text-shadow: 2px 2px 6px rgba(0,0,0,0.8);
    }

    /* DESCRIPTION */
    .demo-text {
      text-align: center;
      font-size: 13px;
      color: #fff;
      opacity: 0.85;
      margin-bottom: 20px;
      font-style: italic;
    }

    /* CENTER BUTTON */
    .btn-center {
      display: flex;
      justify-content: center;
    }

    /* =========================
       EFFECTS (RESTORED)
    ========================= */

    /* HOVER PULSE */
    .hover-pulse {
      background: linear-gradient(145deg, #ff1493, #ff69b4);
      color: white;
      padding: 14px 35px;
      border: none;
      border-radius: 30px;
      font-weight: bold;
      cursor: pointer;
      transition: 0.4s;
    }

    .hover-pulse:hover {
      transform: scale(1.1) rotate(3deg);
      box-shadow: 0 20px 50px rgba(255,105,180,0.8);
    }

    /* SHINE */
    .hover-shine {
      background: linear-gradient(145deg, #ff4500, #ff1493);
      color: white;
      padding: 14px 35px;
      border: none;
      border-radius: 30px;
      font-weight: bold;
      cursor: pointer;
      position: relative;
      overflow: hidden;
    }

    .hover-shine::before {
      content: "";
      position: absolute;
      top: 0;
      left: -100%;
      width: 100%;
      height: 100%;
      background: linear-gradient(90deg, transparent, rgba(255,255,255,0.5), transparent);
      transition: 0.5s;
    }

    .hover-shine:hover::before {
      left: 100%;
    }

    /* SHADOW LIFT */
    .shadow-lift {
      background: #9932cc;
      color: white;
      padding: 14px 35px;
      border: none;
      border-radius: 30px;
      font-weight: bold;
      cursor: pointer;
      transition: 0.4s;
    }

    .shadow-lift:hover {
      transform: translateY(-10px);
      box-shadow: 0 20px 40px rgba(0,0,0,0.5);
    }

    /* FLOAT */
    .shadow-float {
      background: white;
      color: #ff1493;
      padding: 14px 35px;
      border: none;
      border-radius: 30px;
      font-weight: bold;
      cursor: pointer;
      transition: 0.4s;
    }

    .shadow-float:hover {
      transform: rotateX(10deg) translateY(-10px);
      box-shadow: 0 25px 50px rgba(0,0,0,0.4);
    }

    /* MORPH */
    .transition-morph {
      background: #ba55d3;
      color: white;
      padding: 14px 35px;
      border: none;
      border-radius: 20px;
      font-weight: bold;
      cursor: pointer;
      transition: 0.4s;
    }

    .transition-morph:hover {
      background: white;
      color: #ff1493;
      transform: scale(1.05);
    }

    /* FLIP */
    .transition-flip {
      background: #ff1493;
      color: white;
      padding: 14px 35px;
      border: none;
      border-radius: 30px;
      font-weight: bold;
      cursor: pointer;
      transition: 0.6s;
    }

    .transition-flip:hover {
      transform: rotateY(180deg);
    }

  </style>
</head>

<body>

<h1>ACTIVITY #3: CSS HOVER, SHADOW AND TRANSITION</h1>

<div class="effects-container">

  <div class="effect-card">
    <div class="effect-title">HOVER EFFECT</div>
    <div class="demo-text">Pulse Animation</div>
    <div class="btn-center">
      <button class="hover-pulse">DARLING</button>
    </div>
  </div>

  <div class="effect-card">
    <div class="effect-title">HOVER EFFECT</div>
    <div class="demo-text">Shine Sweep</div>
    <div class="btn-center">
      <button class="hover-shine">SHINE</button>
    </div>
  </div>

  <div class="effect-card">
    <div class="effect-title">SHADOW EFFECT</div>
    <div class="demo-text">Lift Effect</div>
    <div class="btn-center">
      <button class="shadow-lift">LIFT</button>
    </div>
  </div>

  <div class="effect-card">
    <div class="effect-title">SHADOW EFFECT</div>
    <div class="demo-text">3D Float</div>
    <div class="btn-center">
      <button class="shadow-float">FLOAT</button>
    </div>
  </div>

  <div class="effect-card">
    <div class="effect-title">TRANSITION</div>
    <div class="demo-text">Morph Effect</div>
    <div class="btn-center">
      <button class="transition-morph">MORPH</button>
    </div>
  </div>

  <div class="effect-card">
    <div class="effect-title">TRANSITION</div>
    <div class="demo-text">Flip Effect</div>
    <div class="btn-center">
      <button class="transition-flip">FLIP</button>
    </div>
  </div>

</div>

<!-- NAVIGATION (UNCHANGED — DO NOT REMOVE) -->
<div class="navigator-container">
  <button class="arrow" onclick="navPrev()">‹</button>

  <a href="activity6.html" class="nav-btn" id="link1">1</a>
  <a href="activity5.html" class="nav-btn" id="link2">2</a>
  <a href="activity4.html" class="nav-btn" id="link3">3</a>
  <a href="activity2.html" class="nav-btn" id="link4">4</a>
  <a href="activity3.html" class="nav-btn" id="link5">5</a>
  <a href="index.html" class="nav-btn">🏠</a>

  <button class="arrow" onclick="navNext()">›</button>
</div>

<script>
  const navSequence = [
    "activity6.html",
    "activity5.html",
    "activity4.html",
    "activity2.html",
    "activity3.html"
  ];

  const currentFile = window.location.pathname.split("/").pop() || "index.html";
  const currentIndex = navSequence.indexOf(currentFile);

  if (currentIndex !== -1) {
    document.getElementById(`link${currentIndex + 1}`).classList.add('active');
  }

  function navNext() {
    if (currentIndex < navSequence.length - 1) {
      window.location.href = navSequence[currentIndex + 1];
    }
  }

  function navPrev() {
    if (currentIndex > 0) {
      window.location.href = navSequence[currentIndex - 1];
    }
  }
</script>

</body>
</html>
